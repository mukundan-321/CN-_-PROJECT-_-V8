org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Pin to the well-established Kotlin Gradle Plugin path rather than the
# newer built-in-Kotlin migration, since that path is still being rolled
# out and this project was authored without a live Gradle sync to verify
# against it. Safe to remove once you've confirmed the built-in-Kotlin
# path works with your installed Flutter SDK version.
android.builtInKotlin=false
android.newDsl=false
